openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: game
    description: Game save operations
  - name: chat
    description: Chatbot operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /game/save:
    get:
      operationId: getGameSave
      tags: [game]
      summary: Load game save for authenticated user
      responses:
        "200":
          description: Game save data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSave"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertGameSave
      tags: [game]
      summary: Save game progress for authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameSaveInput"
      responses:
        "200":
          description: Saved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSave"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/message:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to the game chatbot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: Chatbot reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatReply"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GameSave:
      type: object
      required: [energy, energyPerClick, energyPerSecond, upgradeCounts]
      properties:
        energy:
          type: number
        energyPerClick:
          type: number
        energyPerSecond:
          type: number
        upgradeCounts:
          type: object
          additionalProperties:
            type: integer

    GameSaveInput:
      type: object
      required: [energy, energyPerClick, energyPerSecond, upgradeCounts]
      properties:
        energy:
          type: number
        energyPerClick:
          type: number
        energyPerSecond:
          type: number
        upgradeCounts:
          type: object
          additionalProperties:
            type: integer

    ChatMessageInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
        language:
          type: string
          description: "Language code: 'pt' or 'en'"

    ChatReply:
      type: object
      required: [reply]
      properties:
        reply:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
