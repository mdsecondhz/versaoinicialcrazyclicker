kind = "web"
previewPath = "/"
title = "Idle Clicker 3D"
version = "1.0.0"
id = "artifacts/3d-idle-clicker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21581

[services.development]
run = "pnpm --filter @workspace/3d-idle-clicker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/3d-idle-clicker", "run", "build" ]
publicDir = "artifacts/3d-idle-clicker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21581"
BASE_PATH = "/"
